<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Carousel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
    }

    .carousel {
      position: relative;
      width: 600px;
      overflow: hidden;
      border: 2px solid #ccc;
      border-radius: 8px;
      background-color: #fff;
    }

    .slides {
      display: flex;
      width: 100%;
      transition: transform 0.4s ease-in-out;
    }

    .slide {
      min-width: 100%;
    }

    .slide img {
      width: 100%;
      height: auto;
      display: block;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      cursor: pointer;
      padding: 10px;
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }

    .dots {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }

    .dot {
      height: 12px;
      width: 12px;
      margin: 0 5px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      cursor: pointer;
    }

    .dot.active {
      background-color: #333;
    }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="slides">
      <div class="slide"><img src="images1.jpg" alt="Slide 1"></div>
      <div class="slide"><img src="images2.jpg" alt="Slide 2"></div>
      <div class="slide"><img src="images3.jpg" alt="Slide 3"></div>
    </div>
    <button class="arrow prev">&#10094;</button>
    <button class="arrow next">&#10095;</button>
    <div class="dots"></div>
  </div>

  <script>
    const slides = document.querySelector('.slides');
    const slideCount = document.querySelectorAll('.slide').length;
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    const dotsContainer = document.querySelector('.dots');

    let currentSlide = 0;
    let slideInterval = setInterval(nextSlide, 5000);

    function goToSlide(index) {
      slides.style.transform = `translateX(-${index * 100}%)`;
      currentSlide = index;
      updateDots();
    }

    function nextSlide() {
      let next = (currentSlide + 1) % slideCount;
      goToSlide(next);
    }

    function prevSlide() {
      let prev = (currentSlide - 1 + slideCount) % slideCount;
      goToSlide(prev);
    }

    function updateDots() {
      document.querySelectorAll('.dot').forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlide);
      });
    }

    // Create dots dynamically
    for (let i = 0; i < slideCount; i++) {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if (i === 0) dot.classList.add('active');
      dot.addEventListener('click', () => {
        goToSlide(i);
        resetInterval();
      });
      dotsContainer.appendChild(dot);
    }

    function resetInterval() {
      clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, 5000);
    }

    prevBtn.addEventListener('click', () => {
      prevSlide();
      resetInterval();
    });

    nextBtn.addEventListener('click', () => {
      nextSlide();
      resetInterval();
    });
  </script>
</body>
</html>
